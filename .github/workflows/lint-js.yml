name: Javascripts

on: [push]

jobs:
  eslint:
    name: Plain JS files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: bin/eslint
  coffeelint:
    name: Coffee JS files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: bin/coffeelint
